<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>赛博猫窝</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
    canvas { 
      background: #2a2520; 
      max-width: 100%; max-height: 100%; 
      aspect-ratio: 4 / 3; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
      cursor: crosshair; 
    }
    #card {
      display: none; position: absolute; background: #fef9f0; border: 2px solid #a68358; border-radius: 6px; 
      padding: 14px; width: 280px; font-size: 14px; color: #333; box-shadow: 4px 4px 15px rgba(0,0,0,0.4); 
      z-index: 100; pointer-events: none; margin-top: -15px;
    }
    #card-content { line-height: 1.6; }
    #card-author { margin-top: 10px; font-size: 11px; color: #888; text-align: right; }
  </style>
</head>
<body>

<canvas id="c" width="800" height="600"></canvas>
<div id="card">
  <div id="card-content"></div>
  <div id="card-author"></div>
</div>

<script>
const W = 800, H = 600;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let mouseX = W/2, mouseY = H/2;
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}
window.addEventListener('mousemove', e => { 
  const pos = getMousePos(e); mouseX = pos.x; mouseY = pos.y; 
});

const trashLibrary = [ 
  { c: "猫的鼻子纹路就像人类的指纹，每只猫都独一无二。", a: "🐾 喵星解码" }, 
  { c: "《塞尔达传说》的灵感来自宫本茂小时候在京都野外探索的经历。", a: "🗡️ 海拉鲁拾遗" }, 
  { c: "你今天很棒。如果没人跟你说，那纸团告诉你。", a: "📄 揉皱的纸团" }
];
const goldenLibrary = [
  { c: "01001000 01001001... 嗝！系统过载吐出的陈年旧码。", a: "⚠️ 扫地机反刍物" },
  { c: "扫地机器人日记：今天又被奶牛猫逼疯了，但白猫摸了我的头。", a: "🤖 AI核心日记" }
];

let weather = 'sunny'; 
let weatherTimer = 5000;
let particles = [];

function updateWeather(dt) {
  weatherTimer -= dt;
  if (weatherTimer <= 0) {
    const ws = ['sunny', 'rain', 'snow'];
    weather = ws[Math.floor(Math.random() * ws.length)];
    weatherTimer = 10000 + Math.random() * 10000;
    particles = [];
  }
  
  if (weather === 'rain') {
    if (Math.random() < 0.5) particles.push({ x: 150 + Math.random()*500, y: 50, vy: 10 + Math.random()*5, l: 15 });
  } else if (weather === 'snow') {
    if (Math.random() < 0.2) particles.push({ x: 150 + Math.random()*500, y: 50, vy: 1 + Math.random(), vx: (Math.random()-0.5)*2, l: 3 });
  }

  particles.forEach(p => { p.y += p.vy; if(p.vx) p.x += p.vx; });
  particles = particles.filter(p => p.y < 350);
}

function drawRoom() {
  ctx.fillStyle = '#3a332a'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#2b251e'; ctx.fillRect(0, 0, W, 180);
  ctx.strokeStyle = '#251f19'; ctx.lineWidth = 2;
  for(let y=220; y<H; y+=50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  
  ctx.fillStyle = '#1a202c'; ctx.fillRect(150, 40, 500, 300);
  ctx.save(); ctx.beginPath(); ctx.rect(150, 40, 500, 300); ctx.clip();
  if (weather === 'sunny') {
    ctx.fillStyle = '#2c405a'; ctx.fillRect(150, 40, 500, 300);
    ctx.fillStyle = 'rgba(255,255,200,0.1)';
    ctx.beginPath(); ctx.moveTo(150,40); ctx.lineTo(400,340); ctx.lineTo(150,340); ctx.fill();
  } else if (weather === 'rain') {
    ctx.strokeStyle = 'rgba(150, 180, 220, 0.4)'; ctx.lineWidth = 1;
    particles.forEach(p => { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x-3, p.y+p.l); ctx.stroke(); });
  } else if (weather === 'snow') {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    particles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.l, 0, Math.PI*2); ctx.fill(); });
  }
  ctx.restore();
  ctx.strokeStyle = '#1e1814'; ctx.lineWidth = 10; ctx.strokeRect(150, 40, 500, 300);
  ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(400, 40); ctx.lineTo(400, 340); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(150, 150); ctx.lineTo(650, 150); ctx.stroke();
}

function drawShadow(w, h) {
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 0, w, h, 0, 0, Math.PI*2); ctx.fill();
}

class Trash {
  constructor(x,y,vx,vy,isGolden=false) { 
    this.x=x; this.y=y; this.vx=vx||0; this.vy=vy||0; 
    this.scattered=false; this.pieces=[]; this.isGolden=isGolden;
  }
  scatter() { 
    this.scattered=true; 
    for(let i=0;i<4;i++) this.pieces.push({x:this.x+(Math.random()-0.5)*40, y:this.y+(Math.random()-0.5)*40}); 
  }
  update() {
    if(this.scattered) return;
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.92; this.vy *= 0.92;
    if(this.y < 350) { this.y=350; this.vy*=-0.5; }
    if(this.y > H-40) { this.y=H-40; this.vy*=-0.5; }
    if(this.x < 40) { this.x=40; this.vx*=-0.5; }
    if(this.x > W-40) { this.x=W-40; this.vx*=-0.5; }
  }
  draw() {
    ctx.save(); ctx.translate(this.x,this.y); ctx.scale(1.5,1.5);
    if(this.scattered) {
      ctx.fillStyle=this.isGolden?'#e8ca58':'#b0b0b0'; 
      this.pieces.forEach(p=>{
        ctx.save(); ctx.translate(p.x-this.x, p.y-this.y); ctx.rotate(Math.random());
        ctx.fillRect(-3,-2,6,4); ctx.restore();
      });
    } else {
      drawShadow(8, 4); ctx.translate(0, -5);
      ctx.fillStyle=this.isGolden?'#ffd700':'#e0e0e0'; 
      ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=this.isGolden?'#b8860b':'#a0a0a0'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(-4,-3); ctx.lineTo(4,2); ctx.moveTo(-3,4); ctx.lineTo(4,-3); ctx.stroke();
    }
    ctx.restore();
  }
}

let furnitures = [
  { t:'bed', x:W-180, y:H-100, w:50, h:25, ox:0, oy:0, state:'normal' },
  { t:'yarn', x:W-300, y:H-80, w:20, h:20, ox:0, oy:0, vx:0, vy:0, state:'normal' },
  { t:'box', x:W-100, y:H-160, w:45, h:35, ox:0, oy:0, state:'normal' },
  { t:'tree', x:100, y:H-180, w:40, h:80, ox:0, oy:0, state:'normal' },
  { t:'bin', x:W-250, y:H-200, w:25, h:30, ox:0, oy:0, state:'up' }
];

function drawFurnitures() {
  furnitures.forEach(f => {
    if(f.t === 'yarn' && !f.isGrabbed) {
      f.x += f.vx; f.y += f.vy; f.vx *= 0.96; f.vy *= 0.96;
      if(f.x < 40) { f.x=40; f.vx *= -1; } if(f.x > W-40) { f.x=W-40; f.vx *= -1; }
      if(f.y < 350) { f.y=350; f.vy *= -1; } if(f.y > H-40) { f.y=H-40; f.vy *= -1; }
    }
    
    ctx.save(); ctx.translate(f.x, f.y); ctx.scale(1.8, 1.8);
    if(f.t === 'bed') {
      if(!f.isGrabbed) drawShadow(30, 15);
      ctx.fillStyle='#4a6b8c'; ctx.beginPath(); ctx.ellipse(0,-3, 28, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#658bad'; ctx.beginPath(); ctx.ellipse(0,-6, 20, 9, 0, 0, Math.PI*2); ctx.fill();
    } else if(f.t === 'box') {
      if(!f.isGrabbed) drawShadow(25, 12);
      ctx.fillStyle='#8b6a47'; ctx.fillRect(-20,-20,40,25);
      ctx.fillStyle='#604830'; ctx.fillRect(-18,-18,36,20); 
      ctx.fillStyle='#a8855e'; ctx.fillRect(-20,-24,40,4); ctx.fillRect(-22,-20,2,25);
    } else if(f.t === 'tree') {
      if(!f.isGrabbed) drawShadow(25, 12);
      ctx.fillStyle='#9e8d73'; ctx.fillRect(-20,5,40,8);
      ctx.fillStyle='#b8a992'; ctx.fillRect(-6,-40,12,50); 
      ctx.strokeStyle='#8c7d65'; ctx.lineWidth=1;
      for(let i=-38; i<10; i+=3) { ctx.beginPath(); ctx.moveTo(-6,i); ctx.lineTo(6,i+2); ctx.stroke(); }
      ctx.fillStyle='#9e8d73'; ctx.fillRect(-22,-45,44,6); 
    } else if(f.t === 'yarn') {
      if(!f.isGrabbed) drawShadow(12, 6);
      ctx.rotate(f.x * 0.05); 
      ctx.fillStyle='#b84d4d'; ctx.beginPath(); ctx.arc(0,-6,10,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#913636'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-6,-10); ctx.lineTo(5,0); ctx.moveTo(3,-11); ctx.lineTo(-5,0); ctx.stroke();
    } else if(f.t === 'bin') {
      if(!f.isGrabbed && f.state === 'up') drawShadow(16, 8);
      if(f.state === 'down') { ctx.translate(0, 5); ctx.rotate(-Math.PI/2); }
      ctx.fillStyle='#5c6666'; ctx.fillRect(-12,-22,24,24);
      ctx.fillStyle='#737f80'; ctx.beginPath(); ctx.ellipse(0,-22, 12, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#cfd6d6'; ctx.fillRect(-5,-26,8,8); ctx.fillRect(-2,-24,10,6);
    }
    ctx.restore();
  });
}

class Cat {
  constructor(type, x, c) {
    this.type = type; this.x = x; this.y = 400; this.c = c;
    this.state = 'wander'; this.vx=0; this.vy=0; this.timer=0;
    this.emo = null; this.emoTimer = 0;
    this.isGrabbed = false; this.riding = false;
    this.targetObj = null;
  }
  setEmo(e, time=1500) { this.emo = e; this.emoTimer = time; }
  
  update(dt, cats) {
    if(this.isGrabbed) return;
    if(this.emoTimer > 0) this.emoTimer -= dt; else this.emo = null;

    if(this.riding && gemini.state === 'sweep') {
      this.x = gemini.x; this.y = gemini.y - 30;
      if(Math.random()<0.003 || gemini.state !== 'sweep') { this.riding = false; this.vy = -2; gemini.rider = null; }
      return;
    } else { this.riding = false; }

    this.timer -= dt;
    let busy = ['sniff', 'sleep_bed', 'sit_box', 'sit_tree', 'in_bin', 'window'].includes(this.state);
    if(busy && this.timer <= 0) {
      if(this.state === 'in_bin' && this.targetObj) this.y += 30; // 钻出来往下走点
      this.state = 'wander'; 
      this.targetObj = null;
    }

    // 寄居蟹垃圾桶逻辑
    if(this.state === 'in_bin' && this.targetObj && this.targetObj.state === 'down') {
      this.x = this.targetObj.x; this.y = this.targetObj.y;
      this.targetObj.x -= 1.5; // 往左顶
      if(this.targetObj.x < 50) this.targetObj.x = 50;
      if(Math.random()<0.02) trashes.push(new Trash(this.x+20, this.y, 2, -2));
      return; // 被困在桶里不执行下面的
    }

    // 追逐毛线球
    if(this.state === 'chase_yarn') {
      let yarn = furnitures.find(f => f.t === 'yarn');
      if(!yarn || this.timer <= 0) { this.state = 'wander'; }
      else {
        const dx = yarn.x - this.x, dy = yarn.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 30) {
          yarn.vx += dx * 0.2; yarn.vy += dy * 0.2; this.setEmo('✨', 800);
        } else {
          this.vx = (dx/dist)*3; this.vy = (dy/dist)*3;
        }
      }
    }

    // 追逐其他猫
    if(this.state === 'chase_cat' && this.targetObj) {
      if(this.timer <= 0) this.state = 'wander';
      else {
        const dx = this.targetObj.x - this.x, dy = this.targetObj.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 20) this.state = 'wander';
        else { this.vx = (dx/dist)*4; this.vy = (dy/dist)*4; }
      }
    }

    cats.forEach(other => { 
      if(other!==this && !other.isGrabbed && !busy && this.state !== 'chase_cat' && this.state !== 'chase_yarn'){ 
        const dx=this.x-other.x, dy=this.y-other.y, dist=Math.sqrt(dx*dx+dy*dy); 
        if(dist<40 && this.state==='wander' && other.state==='wander' && Math.random()<0.02) {
          this.state = 'sniff'; other.state = 'sniff'; this.timer = 1500; other.timer = 1500; this.vx=0; other.vx=0;
          this.setEmo('❓'); other.setEmo('❓');
          // 互嗅后概率触发追逐战
          if(Math.random()<0.3) {
            setTimeout(() => {
              if(!this.isGrabbed && !other.isGrabbed) {
                this.state = 'chase_cat'; this.targetObj = other; this.timer = 3000; this.setEmo('💢', 1000);
                other.state = 'wander'; other.vx = (Math.random()-0.5)*5; other.vy = (Math.random()-0.5)*5;
              }
            }, 1500);
          }
        } else if(dist<25){ this.x+=dx*0.05; this.y+=dy*0.05; } 
      } 
    });

    if(this.state === 'wander' && Math.random() < 0.03) {
      let f = furnitures.find(f => Math.abs(f.x - this.x) < 50 && Math.abs(f.y - this.y) < 50);
      if(f) {
        if(f.t === 'bed' && Math.random()<0.3) { this.state = 'sleep_bed'; this.x = f.x; this.y = f.y-8; this.timer = 8000; this.setEmo('💤', 8000); }
        else if(f.t === 'box' && Math.random()<0.3) { this.state = 'sit_box'; this.x = f.x; this.y = f.y-10; this.timer = 6000; }
        else if(f.t === 'tree' && Math.random()<0.3) { this.state = 'sit_tree'; this.x = f.x; this.y = f.y-85; this.timer = 6000; this.setEmo('💤', 6000); }
        else if(f.t === 'bin' && f.state === 'up' && Math.random()<0.4) {
          f.state = 'down'; this.state = 'in_bin'; this.targetObj = f; this.timer = 8000;
        }
        else if(f.t === 'yarn' && Math.random()<0.4) { this.state = 'chase_yarn'; this.timer = 5000; }
      }
      if((weather === 'rain' || weather === 'snow') && Math.random()<0.3 && this.y < 380) {
        this.state = 'window'; this.vx = 0; this.vy = 0; this.timer = 4000; this.setEmo('❗', 1000);
      }
    }

    if(this.type === 'cow' && !busy && this.state === 'wander') {
      if(this.timer<=0) {
        if(Math.random()<0.2) { this.state='zoomies'; this.vx=(Math.random()-0.5)*8; this.vy=(Math.random()-0.5)*3; this.timer=1500; this.setEmo('💢',1500); }
        else { this.vx=(Math.random()-0.5)*1.5; this.vy=(Math.random()-0.5)*0.8; this.timer=1500; }
      }
    } else if(!busy && this.state === 'wander') {
      if(this.timer<=0) {
        if(Math.random()<0.3) { this.vx=0; this.vy=0; this.state='sleep'; this.timer=3000; this.setEmo('💤', 3000); }
        else { const a=Math.random()*Math.PI*2; this.vx=Math.cos(a)*1.2; this.vy=Math.sin(a)*0.6; this.timer=2000; }
      }
    }

    if(!busy) {
      this.x += this.vx * dt * 0.05; this.y += this.vy * dt * 0.05;
      this.x = Math.max(50, Math.min(W-50, this.x));
      this.y = Math.max(350, Math.min(H-40, this.y));
    }
  }
  
  draw() {
    ctx.save(); ctx.translate(this.x, this.y); ctx.scale(1.5, 1.5);
    
    if(this.state === 'window') { } else if(this.vx<0 && !this.isGrabbed && this.state !== 'in_bin') ctx.scale(-1,1);
    if(this.emo && !this.isGrabbed) { ctx.scale(this.vx<0?-1:1, 1); ctx.fillStyle='#fff'; ctx.font='14px sans-serif'; ctx.fillText(this.emo, -8, -25); ctx.scale(this.vx<0?-1:1, 1); }

    if(!this.isGrabbed && !['sleep_bed', 'sit_box', 'sit_tree', 'in_bin'].includes(this.state)) drawShadow(12, 5);

    ctx.fillStyle = this.c.body;
    
    if(this.isGrabbed) {
      const kick = Math.sin(Date.now() * 0.04) * 3;
      ctx.fillRect(-6, -4, 12, 18); ctx.fillRect(-6, -12, 12, 10);
      ctx.fillRect(-5, 14, 3, 5+kick); ctx.fillRect(2, 14, 3, 5-kick);
      ctx.fillStyle=this.c.ear; ctx.fillRect(-5, -16, 3, 4); ctx.fillRect(2, -16, 3, 4);
      ctx.fillStyle=this.c.eye; ctx.fillRect(-4, -8, 2, 2); ctx.fillRect(2, -8, 2, 2);
    } else if(this.state === 'in_bin') {
      ctx.save(); ctx.translate(12, 5); ctx.rotate(Math.PI/2);
      ctx.fillRect(-6, -4, 12, 10); // 屁股
      ctx.save(); ctx.translate(0, 6); ctx.rotate(Math.sin(Date.now()*0.03)*0.8); ctx.fillRect(-2,0,4,12); ctx.restore(); // 疯狂摇尾巴
      ctx.restore();
    } else if(this.state === 'sit_box') {
      ctx.fillRect(-6,-16,12,10); 
      ctx.fillStyle=this.c.ear; ctx.fillRect(-5,-20,4,5); ctx.fillRect(1,-20,4,5);
      ctx.fillStyle=this.c.eye; ctx.fillRect(-4,-13,2,2); ctx.fillRect(2,-13,2,2);
      ctx.fillStyle = this.c.body;
      ctx.save(); ctx.translate(15, -5); ctx.rotate(Math.sin(Date.now()*0.01)*0.5); ctx.fillRect(0,0,12,4); ctx.restore(); 
    } else if(this.state === 'sleep_bed' || this.state === 'sit_tree' || this.state === 'sleep') {
      ctx.fillRect(-10,-5,20,12); ctx.fillRect(-8,-12,12,10);
      ctx.fillStyle=this.c.ear; ctx.fillRect(-7,-16,4,5); ctx.fillRect(3,-16,4,5);
      ctx.fillStyle='#1a1a1a'; ctx.fillRect(-5,-8,4,1.5); ctx.fillRect(3,-8,4,1.5);
    } else if(this.state === 'window') {
      ctx.fillRect(-8,-8,16,14); ctx.fillRect(-6,-16,12,10); 
      ctx.fillStyle=this.c.ear; ctx.fillRect(-6,-20,4,5); ctx.fillRect(2,-20,4,5);
      ctx.fillStyle = this.c.body;
      ctx.save(); ctx.translate(0, 4); ctx.rotate(Math.PI/2 + Math.sin(Date.now()*0.005)*0.2); ctx.fillRect(0,0,14,4); ctx.restore();
    } else {
      ctx.fillRect(-9,-8,18,12); ctx.fillRect(-7,-15,12,10);
      const moving = Math.abs(this.vx)>0.1 || Math.abs(this.vy)>0.1;
      const bounce = moving ? Math.sin(Date.now()*0.02)*2 : 0;
      ctx.fillRect(-8,4,4,5-bounce); ctx.fillRect(4,4,4,5+bounce);
      ctx.fillStyle=this.c.ear; ctx.fillRect(-7,-19,4,5); ctx.fillRect(3,-19,4,5);
      ctx.fillStyle=this.c.eye; ctx.fillRect(-4,-11,2,2); ctx.fillRect(4,-11,2,2);
      if(this.type === 'cow') { ctx.fillStyle='#222'; ctx.fillRect(-9,-8,8,6); ctx.fillRect(1,-5,8,7); ctx.fillRect(-7,-15,5,5); }
      ctx.fillStyle = this.c.body;
      ctx.save(); ctx.translate(-8, -3); ctx.rotate(Math.sin(Date.now()*0.01)*0.5); ctx.fillRect(-12, -2, 12, 4); ctx.restore();
    }
    ctx.restore();
  }
}

class GeminiBot {
  constructor() {
    this.x = W/2; this.y = H-80; 
    this.state = 'idle'; 
    this.dir = 1; this.timer = 5000; this.rider = null;
    this.target = null; this.emo = '♪';
    this.emos = ['♥', '✨', '♪', '=_=', '>_<', '🤖'];
  }
  update(dt, cats, trashes) {
    this.timer -= dt;

    if(this.state === 'idle' && this.timer <= 0) {
      this.state = 'sweep'; this.dir = Math.random()<0.5?1:-1; 
      this.timer = 20000; this.emo = this.emos[Math.floor(Math.random()*this.emos.length)];
    }

    if(this.state === 'sweep') {
      let whiteCat = cats.find(c => c.type === 'white');
      let cowCat = cats.find(c => c.type === 'cow');
      
      if(!this.rider && whiteCat && Math.abs(whiteCat.x - this.x) < 80 && Math.abs(whiteCat.y - this.y) < 50) {
        this.state = 'wait'; this.timer = 3000; this.emo = '♥';
      }
      else if(cowCat && cowCat.state === 'zoomies' && Math.abs(cowCat.y - this.y) < 80 && Math.random()<0.01) {
        this.state = 'frenzy'; this.target = cowCat; this.emo = '💢';
      }

      this.x += this.dir * (this.rider ? 0.08 : 0.12) * dt;
      // 撞墙折返
      if(this.x < 50) { this.x = 50; this.dir = 1; this.emo = this.emos[Math.floor(Math.random()*this.emos.length)]; }
      if(this.x > W-50) { this.x = W-50; this.dir = -1; this.emo = this.emos[Math.floor(Math.random()*this.emos.length)]; }

      // 扶正垃圾桶
      let bin = furnitures.find(f => f.t === 'bin');
      if(bin && bin.state === 'down' && Math.abs(this.x - bin.x) < 60 && Math.abs(this.y - bin.y) < 40) {
        bin.state = 'up'; this.emo = '✨';
        cats.forEach(c => { if(c.state==='in_bin' && c.targetObj===bin) { c.state='wander'; c.y+=20; c.setEmo('❓',1000); } });
      }

      trashes.forEach(t=>{ if(t.scattered && Math.abs(t.y-this.y)<40) t.pieces = t.pieces.filter(p=>Math.abs(p.x-this.x)>30); });
      if(this.timer <= 0) { this.state='idle'; this.rider=null; this.timer=8000; this.emo='💤'; trashes=trashes.filter(t=>!t.scattered || t.pieces.length>0); }
    }
    else if(this.state === 'wait') {
      if(this.timer <= 0) { this.state = 'sweep'; this.emo = '♪'; }
    }
    else if(this.state === 'frenzy') {
      this.dir = this.target.x > this.x ? 1 : -1;
      this.x += this.dir * 0.3 * dt; 
      this.y += (this.target.y - this.y) * 0.05; 
      if(this.x < 40 || this.x > W-40) { this.state = 'hiccup'; this.timer = 2500; this.emo = '×_×'; }
    }
    else if(this.state === 'hiccup') {
      if(this.timer <= 0) {
        trashes.push(new Trash(this.x + (this.dir>0?-50:50), this.y, (this.dir>0?-6:6), -6, true));
        this.state = 'idle'; this.timer = 5000; this.emo = '=_=';
      }
    }
  }
  
  draw() {
    ctx.save(); ctx.translate(this.x,this.y); ctx.scale(2.0, 2.0); // 放大1.5倍左右 (基于原有1.5再微调)
    drawShadow(16, 6);
    
    if(this.state === 'hiccup') ctx.rotate(Math.sin(Date.now() * 0.05) * 0.2);
    else if(this.dir<0) ctx.scale(-1,1);
    
    let yOffset = (this.state === 'wait') ? 2 : 0;
    ctx.translate(0, yOffset);

    ctx.fillStyle='#5ba4d4'; ctx.fillRect(-10,-10,20,16); ctx.fillStyle='#d0eeff'; ctx.fillRect(-7,-8,14,8);
    
    ctx.fillStyle=(this.state==='frenzy' || this.state==='hiccup')?'#ff0000':'#2060a0'; 
    ctx.fillRect(-5,-6,3,3); ctx.fillRect(2,-6,3,3); 
    
    ctx.fillStyle='#2c3e50'; ctx.fillRect(-9,6,6,4); ctx.fillRect(3,6,6,4);
    ctx.strokeStyle='#8b7355'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(10,-2); ctx.lineTo(20,6); ctx.stroke();
    
    ctx.scale(this.dir<0?-1:1, 1);
    ctx.fillStyle='rgba(60,130,200,0.9)'; ctx.font='bold 10px sans-serif'; 
    ctx.fillText(this.emo, -6, -15);
    
    ctx.restore();
  }
}

const cats = [
  new Cat('white', W/2-50, {body:'#e6dfd3', ear:'#d4c5b0', eye:'#5c8a6d'}),
  new Cat('grey', W/2, {body:'#9e968d', ear:'#827a70', eye:'#4a6b82'}),
  new Cat('orange', W/2+50, {body:'#e0ab67', ear:'#c28b4a', eye:'#7b5c94'}),
  new Cat('cow', W/2+100, {body:'#f5f5f5', ear:'#222222', eye:'#d4af37'})
];
const gemini = new GeminiBot();
let trashes = [];
let lastTime=performance.now(), spawnTimer=2000;

function loop(ts) {
  const dt = Math.min(ts-lastTime, 50); lastTime=ts;
  ctx.clearRect(0,0,W,H);
  
  updateWeather(dt);
  drawRoom();
  
  spawnTimer-=dt;
  if(spawnTimer<=0 && trashes.filter(t=>!t.scattered).length<4) {
    trashes.push(new Trash(100+Math.random()*(W-200), 380+Math.random()*(H-420)));
    spawnTimer=4000+Math.random()*5000;
  }
  
  let entities = [...furnitures, ...trashes, ...cats];
  // 核心：深度排序重构，让猫和家具的物理遮挡真正生效
  entities.sort((a,b) => {
    let ay = a.y, by = b.y;
    // 如果是站在家具上的猫，强行增加渲染层级高度，确保画在家具上面
    if(a instanceof Cat && ['sleep_bed', 'sit_box', 'sit_tree', 'in_bin'].includes(a.state)) ay += 100;
    if(b instanceof Cat && ['sleep_bed', 'sit_box', 'sit_tree', 'in_bin'].includes(b.state)) by += 100;
    if(a.isGrabbed) ay += 1000; if(b.isGrabbed) by += 1000; 
    return ay - by;
  });

  entities.forEach(e => {
    if(e instanceof Cat) e.update(dt, cats);
    else if(e instanceof Trash) e.update();
  });
  
  entities.forEach(e => {
    if(e instanceof Cat || e instanceof Trash) e.draw();
    else { let old = furnitures; furnitures = [e]; drawFurnitures(); furnitures = old; }
  });
  
  gemini.update(dt, cats, trashes); gemini.draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

const card = document.getElementById('card');
let grabbedObj = null, cardTimeout = null;

canvas.addEventListener('mousedown', e => {
  const pos = getMousePos(e);
  
  // 强制冷静：点扫地机器人
  if(Math.abs(gemini.x - pos.x) < 50 && Math.abs(gemini.y - pos.y) < 50) {
    if(gemini.state === 'frenzy') { gemini.state = 'idle'; gemini.timer = 3000; gemini.emo = '×_×'; return; }
    if(gemini.state === 'sweep') { gemini.emo = '♥'; }
  }
  
  for(let i=cats.length-1; i>=0; i--) {
    let c = cats[i];
    if(Math.abs(c.x-pos.x)<40 && Math.abs(c.y-pos.y)<40) { grabbedObj = c; c.isGrabbed = true; c.riding = false; return; }
  }
  for(let i=furnitures.length-1; i>=0; i--) {
    let f = furnitures[i];
    if(Math.abs(f.x-pos.x)<f.w*2 && Math.abs(f.y-pos.y)<f.h*2) { grabbedObj = f; f.isGrabbed = true; f.ox = f.x-pos.x; f.oy = f.y-pos.y; return; }
  }
  const clickedTrash = trashes.find(t=>!t.scattered && Math.abs(t.x-pos.x)<25 && Math.abs(t.y-pos.y)<25);
  if(clickedTrash) {
    const lib = clickedTrash.isGolden ? goldenLibrary : trashLibrary;
    const item = lib[Math.floor(Math.random()*lib.length)];
    document.getElementById('card-content').textContent = item.c;
    document.getElementById('card-author').textContent = item.a;
    
    // 弹窗定位修正：绝不超出屏幕边界
    let cardLeft = e.clientX;
    let cardTop = e.clientY - 20;
    card.style.display = 'block'; 
    const cWidth = card.offsetWidth; const cHeight = card.offsetHeight;
    if(cardLeft + cWidth/2 > window.innerWidth) cardLeft = window.innerWidth - cWidth/2 - 10;
    if(cardLeft - cWidth/2 < 0) cardLeft = cWidth/2 + 10;
    if(cardTop - cHeight < 0) cardTop = cHeight + 10;
    
    card.style.left = cardLeft + 'px';
    card.style.top = cardTop + 'px';
    
    if(cardTimeout) clearTimeout(cardTimeout);
    cardTimeout = setTimeout(()=>card.style.display='none', 4500);
  }
});

window.addEventListener('mousemove', e => { 
  if(grabbedObj) { 
    const pos = getMousePos(e);
    if(grabbedObj.ox !== undefined) { grabbedObj.x = pos.x + grabbedObj.ox; grabbedObj.y = pos.y + grabbedObj.oy; }
    else { grabbedObj.x = pos.x; grabbedObj.y = pos.y; }
  } 
});

window.addEventListener('mouseup', e => { 
  if(grabbedObj) { grabbedObj.isGrabbed = false; if(grabbedObj.state) grabbedObj.state = 'wander'; grabbedObj = null; } 
});
</script>
